# Azure Load Testing configuration
# Run with: az load test create --load-test-config-file .azure/load-test.yaml
#            --load-test-resource npc-soul-load-test --resource-group rg-npc-soul-engine

version: v0.1
testId: npc-soul-engine-regression
displayName: NPC Soul Engine — Regression Load Test
description: >
  Baseline load test: 10 virtual users for 3 minutes against the staging
  Azure Functions app. Fails the build if p95 response time > 200 ms
  or error rate > 1%.

testPlan: .azure/locustfile.py
testType: Locust

engineInstances: 1

configurationFiles:
  - .azure/load-test.yaml

env:
  - name: FUNCTIONS_BASE_URL
    value: $(FUNCTIONS_BASE_URL)     # injected from GitHub Actions secret
  - name: FUNCTIONS_HOST_KEY
    value: $(FUNCTIONS_HOST_KEY)

loadConfiguration:
  engineInstances: 1
  duration: 180        # seconds
  rampUpTime: 30       # seconds
  virtualUsers: 10

failureCriteria:
  - avg(response_time_ms)             > 150
  - percentile(response_time_ms, 95)  > 200
  - percentile(response_time_ms, 99)  > 500
  - percentage(error)                 > 1
